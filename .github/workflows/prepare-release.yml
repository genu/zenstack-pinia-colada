name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: genu/prepare-release-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
